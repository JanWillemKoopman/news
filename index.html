<!DOCTYPE html>
<html lang="nl">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSV Nieuwsbrief</title>
  <link rel="stylesheet" href="style.css" />
  <script>(function(){var t=localStorage.getItem('weekoverzicht-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})();</script>
</head>
<body>

  <header>
    <div class="container">
      <div class="header-bar">
        <button class="header-btn hamburger-btn" id="hamburger-btn" aria-label="Menu openen" aria-expanded="false">
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </button>
        <div class="header-logo">
          <!-- Voeg hier een <img src="logo.svg" alt="Weekoverzicht"> toe -->
        </div>
        <button class="header-btn theme-toggle-btn" id="theme-toggle-btn" aria-label="Schakel naar donker thema">
          <svg class="icon icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>
    <nav class="hamburger-menu" id="hamburger-menu" aria-hidden="true">
      <div class="container">
        <ul class="menu-list">
          <li><a href="#">Archief</a></li>
          <li><a href="#">Over</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main class="container">

    <div id="summaries-list"></div>

    <div id="empty-state" class="empty-state" style="display:none;">
      <p>Er zijn nog geen samenvattingen beschikbaar. De eerste verschijnt aanstaande zondag om 16:00 uur.</p>
    </div>

    <div id="loading-state" class="loading-state">
      <span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>
    </div>

    <div id="pagination" style="display:none;">
      <button id="load-more-btn" class="btn-older">
        Ouder nieuws <span class="btn-arrow">&#8594;</span>
      </button>
    </div>

  </main>

  <footer>
    <div class="container">
      <div class="footer-inner">
        <span>Weekoverzicht</span>
        <span class="footer-sep">&mdash;</span>
        <span>Gegenereerd met Gemini AI</span>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>

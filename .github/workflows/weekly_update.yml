name: Wekelijkse nieuwsupdate

on:
  schedule:
    # Elke zondag 14:00 UTC = 16:00 CEST (zomertijd) / 15:00 CET (wintertijd)
    - cron: '0 14 * * 0'
  workflow_dispatch:
    # Ook handmatig te starten via GitHub → Actions → "Run workflow"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies installeren
        run: pip install python-dotenv pytz

      - name: Nieuwsupdate uitvoeren
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/update.py

      - name: Commit en push summaries.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/summaries.json
          git diff --staged --quiet && echo "Geen wijzigingen" || (
            git commit -m "Weekoverzicht $(date +%Y-%m-%d)"
            git push
          )

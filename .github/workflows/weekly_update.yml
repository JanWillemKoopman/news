name: PSV Nieuwsbrief update

on:
  schedule:
    # Elke zondag 18:00 UTC = 20:00 CEST (zomertijd) / 19:00 CET (wintertijd)
    - cron: '0 18 * * 0'
  workflow_dispatch:
    # Ook handmatig te starten via GitHub → Actions → "Run workflow"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies installeren
        run: pip install python-dotenv pytz trafilatura google-genai requests

      - name: PSV Nieuwsbrief genereren
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/update_psv.py

      - name: Commit en push resultaten
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/summaries.json data/seen_items.json runs/
          git diff --staged --quiet && echo "Geen wijzigingen" || (
            SCORE=$(python -c "
import json, glob, sys
files = sorted(glob.glob('runs/*/review_ronde_*.json'), reverse=True)
if files:
    d = json.load(open(files[0]))
    print(d.get('score', '?'))
else:
    print('?')
" 2>/dev/null || echo "?")
            git commit -m "PSV Nieuwsbrief $(date +%Y-%m-%d) — review-score: ${SCORE}/10"
            git push
          )

name: CI

on:
  push:
    branches: [main]
  pull_request:

# Nieuwe push annuleert een lopende run voor dezelfde branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        # Dummy-waarden: de build heeft alleen geldige env-vóórkomens nodig,
        # geen echte secrets. Productie-deploys gebruiken de echte secrets.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: npm run build

  lint:
    name: Lint (informatief)
    runs-on: ubuntu-latest
    # Niet-blokkerend: er staat nog een backlog aan lint-bevindingen open.
    # Zodra die is opgeruimd kan continue-on-error eruit en wordt lint een gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

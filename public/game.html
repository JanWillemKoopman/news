<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cozy Campfire 🔥</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #05050f;
  display: flex;
  justify-content: center;
  min-height: 100dvh;
  overflow: hidden;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}
#g {
  position: relative;
  width: min(100vw, 480px);
  height: 100dvh;
}
canvas { display: block; width: 100%; height: 100%; touch-action: none; }
</style>
</head>
<body>
<div id="g"><canvas id="c"></canvas></div>
<script>
'use strict';

// ── Canvas ────────────────────────────────────────────────────────────────────
const wrap   = document.getElementById('g');
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    this.beginPath();
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
  };
}

function resize() {
  W = canvas.width  = wrap.clientWidth;
  H = canvas.height = wrap.clientHeight;
  buildStars();
  buildTrees();
}
window.addEventListener('resize', resize);

// ── Audio ─────────────────────────────────────────────────────────────────────
let _ac;
function ac() { return _ac || (_ac = new (window.AudioContext || window.webkitAudioContext)()); }

function playTone(freq, type, dur, vol = 0.22) {
  try {
    const a = ac(), o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = type;
    o.frequency.setValueAtTime(freq, a.currentTime);
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    o.start(); o.stop(a.currentTime + dur);
  } catch (_) {}
}

function sndWood() {
  playTone(200, 'sawtooth', 0.13, 0.28);
  setTimeout(() => playTone(140, 'sawtooth', 0.1, 0.18), 70);
}
function sndDing() {
  playTone(660, 'sine', 0.18, 0.2);
  setTimeout(() => playTone(990, 'sine', 0.14, 0.14), 110);
}
function sndHiss() {
  try {
    const a = ac();
    const buf = a.createBuffer(1, a.sampleRate * 0.55, a.sampleRate);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const src  = a.createBufferSource();
    const filt = a.createBiquadFilter();
    const gain = a.createGain();
    filt.type = 'highpass'; filt.frequency.value = 800;
    src.buffer = buf;
    src.connect(filt); filt.connect(gain); gain.connect(a.destination);
    gain.gain.setValueAtTime(0.5, a.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.55);
    src.start(); src.stop(a.currentTime + 0.55);
  } catch (_) {}
}

// ── Scene elements ────────────────────────────────────────────────────────────
let stars = [], trees = [];

function buildStars() {
  stars = Array.from({ length: 90 }, () => ({
    x: Math.random() * W,
    y: 10 + Math.random() * H * 0.55,
    r: 0.5 + Math.random() * 1.5,
    ph: Math.random() * Math.PI * 2,
    sp: 0.014 + Math.random() * 0.024,
  }));
}

function buildTrees() {
  trees = [];
  const lxs  = [-8, 25, 65, 100, 130, 5, 48];
  const rxs  = lxs.map(x => W - x);
  const ys   = [H - 55, H - 70, H - 58, H - 82, H - 62, H - 95, H - 68];
  const scls = [1.0, 1.25, 0.88, 1.4, 1.1, 0.82, 1.2];
  lxs.forEach((x, i) => trees.push({ x, y: ys[i], s: scls[i] }));
  rxs.forEach((x, i) => trees.push({ x, y: ys[i], s: scls[i] }));
}

// ── Game state ────────────────────────────────────────────────────────────────
let phase = 'title'; // title | play | over
let score = 0;
let highScore = parseInt(localStorage.getItem('cfc_hs') || '0');
let fireMeter = 68;
let fireDecay = 0.014;
let frame = 0;
let spawnEvery = 92;
let nextSpawn  = 75;
let items = [], fireP = [], smokeP = [], floatT = [];
let shakeX = 0, shakeY = 0, shakePow = 0;

// ── Classes ───────────────────────────────────────────────────────────────────
class Item {
  constructor() {
    const r   = Math.random();
    this.type = r < 0.42 ? 'log' : r < 0.74 ? 'water' : 'mallow';
    this.x    = 55 + Math.random() * (W - 110);
    this.y    = -55;
    this.vy   = 1.9 + Math.random() * 0.7 + score / 700;
    this.rot  = (Math.random() - 0.5) * 0.5;
    this.rotV = (Math.random() - 0.5) * 0.022;
    this.hit  = false;
    this.hitT = 0;
    this.r    = this.type === 'water' ? 30 : 34;
    this.swPh = Math.random() * Math.PI * 2;
  }

  update() {
    if (this.hit) { this.hitT++; return this.hitT < 22; }
    this.y   += this.vy;
    this.rot += this.rotV;
    if (this.type === 'water') this.x += Math.sin(frame * 0.038 + this.swPh) * 1.1;
    return true;
  }

  gone() {
    if (this.type === 'water') {
      return this.y > H - 75 && Math.abs(this.x - W / 2) < 90;
    }
    return this.y > H + 70;
  }

  tap() { this.hit = true; }

  draw() {
    ctx.save();
    const sc = this.hit ? Math.max(0, 1 + this.hitT * 0.07) : 1;
    ctx.globalAlpha = this.hit ? Math.max(0, 1 - this.hitT / 20) : 1;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.scale(sc, sc);
    if      (this.type === 'log')   this._log();
    else if (this.type === 'water') this._drop();
    else                            this._mallow();
    ctx.restore();
  }

  _log() {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.beginPath(); ctx.ellipse(2, 15, 22, 7, 0, 0, Math.PI * 2); ctx.fill();
    // Body
    const bg = ctx.createLinearGradient(0, -12, 0, 12);
    bg.addColorStop(0, '#a07848'); bg.addColorStop(0.5, '#6b4226'); bg.addColorStop(1, '#3e2008');
    ctx.fillStyle = bg; ctx.strokeStyle = '#28140a'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(-26, -12, 52, 24, 7); ctx.fill(); ctx.stroke();
    // End caps
    for (const ex of [-26, 26]) {
      const eg = ctx.createRadialGradient(ex, 0, 0, ex, 0, 11);
      eg.addColorStop(0, '#c8a070'); eg.addColorStop(0.45, '#8B5e35'); eg.addColorStop(1, '#4a2810');
      ctx.fillStyle = eg; ctx.strokeStyle = '#28140a'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.ellipse(ex, 0, 9, 12, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.ellipse(ex, 0, 4, 6, 0, 0, Math.PI * 2); ctx.stroke();
    }
    // Bark
    ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth = 1;
    for (let i = -14; i <= 14; i += 8) {
      ctx.beginPath(); ctx.moveTo(i, -10); ctx.lineTo(i + 2, 10); ctx.stroke();
    }
  }

  _drop() {
    // Outer glow
    const gl = ctx.createRadialGradient(0, 5, 0, 0, 5, 40);
    gl.addColorStop(0, 'rgba(100,210,255,0.22)'); gl.addColorStop(1, 'rgba(0,100,200,0)');
    ctx.fillStyle = gl; ctx.beginPath(); ctx.arc(0, 5, 40, 0, Math.PI * 2); ctx.fill();
    // Teardrop body
    ctx.fillStyle = '#4fc3f7'; ctx.strokeStyle = '#0288d1'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, -28);
    ctx.bezierCurveTo(22, -10, 24, 14, 0, 24);
    ctx.bezierCurveTo(-24, 14, -22, -10, 0, -28);
    ctx.fill(); ctx.stroke();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.48)';
    ctx.beginPath(); ctx.ellipse(-7, -11, 5, 10, -0.4, 0, Math.PI * 2); ctx.fill();
    // Inner shine
    ctx.strokeStyle = 'rgba(255,255,255,0.22)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.ellipse(0, 6, 10, 8, 0, 0, Math.PI * 2); ctx.stroke();
  }

  _mallow() {
    // Stick
    const sg = ctx.createLinearGradient(-3, 0, 3, 34);
    sg.addColorStop(0, '#b09070'); sg.addColorStop(1, '#5c3a20');
    ctx.fillStyle = sg; ctx.beginPath(); ctx.roundRect(-3, 4, 6, 30, 3); ctx.fill();
    // Shadow under marshmallow
    ctx.fillStyle = 'rgba(0,0,0,0.13)';
    ctx.beginPath(); ctx.ellipse(1, 8, 20, 7, 0, 0, Math.PI * 2); ctx.fill();
    // Body
    const mg = ctx.createRadialGradient(-6, -9, 3, 0, 0, 23);
    mg.addColorStop(0, '#fff8f0'); mg.addColorStop(0.65, '#ffe8d0'); mg.addColorStop(1, '#f0c8a0');
    ctx.fillStyle = mg; ctx.strokeStyle = '#e8c090'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.ellipse(0, -4, 21, 19, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    // Top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath(); ctx.ellipse(-6, -11, 8, 6, -0.3, 0, Math.PI * 2); ctx.fill();
    // Texture lines
    ctx.strokeStyle = 'rgba(210,160,100,0.3)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-16, 0); ctx.quadraticCurveTo(0, -5, 16, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-19, 6); ctx.quadraticCurveTo(0, 1, 19, 6); ctx.stroke();
  }
}

class FirePart {
  constructor(cx, cy, intensity) {
    const sp = 18 + intensity * 0.22;
    this.x = cx + (Math.random() - 0.5) * sp;
    this.y = cy + (Math.random() - 0.5) * 5;
    this.vx = (Math.random() - 0.5) * 0.7;
    this.vy = -(1.6 + Math.random() * 2.4) * (0.55 + intensity / 100 * 0.45);
    this.life = 0;
    this.max  = 28 + Math.random() * 24;
    this.r    = 5 + Math.random() * intensity * 0.18;
    this.hue  = 18 + Math.random() * 38;
  }
  update() {
    this.x += this.vx + (Math.random() - 0.5) * 0.35;
    this.y += this.vy; this.vy *= 0.972; this.life++;
    return this.life < this.max;
  }
  draw() {
    const t  = this.life / this.max;
    const al = t < 0.18 ? t / 0.18 : 1 - (t - 0.18) / 0.82;
    const rx = this.r * (1 - t * 0.65);
    const ry = rx * 1.45; // taller flame shape
    ctx.save();
    ctx.globalAlpha = al * 0.88;
    ctx.fillStyle = `hsl(${this.hue - t * 18},100%,${70 - t * 38}%)`;
    ctx.beginPath(); ctx.ellipse(this.x, this.y, rx, ry, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

class SmokePart {
  constructor(x, y) {
    this.x = x + (Math.random() - 0.5) * 28;
    this.y = y;
    this.vx = (Math.random() - 0.5) * 1.1;
    this.vy = -(0.5 + Math.random() * 1.1);
    this.life = 0; this.max = 60 + Math.random() * 25;
    this.r = 4 + Math.random() * 5;
  }
  update() { this.x += this.vx; this.y += this.vy; this.r += 0.42; this.life++; return this.life < this.max; }
  draw() {
    ctx.save();
    ctx.globalAlpha = (1 - this.life / this.max) * 0.52;
    ctx.fillStyle = '#b8b8b8';
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

class FloatText {
  constructor(x, y, txt, color = '#FFD700') {
    this.x = x; this.y = y; this.txt = txt; this.col = color;
    this.life = 0; this.max = 58; this.vy = -1.6;
  }
  update() { this.y += this.vy; this.vy *= 0.95; this.life++; return this.life < this.max; }
  draw() {
    const al = this.life < 12 ? this.life / 12 : 1 - (this.life - 12) / (this.max - 12);
    ctx.save();
    ctx.globalAlpha = al;
    ctx.font = 'bold 24px system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 3; ctx.strokeText(this.txt, this.x, this.y);
    ctx.fillStyle = this.col; ctx.fillText(this.txt, this.x, this.y);
    ctx.restore();
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
function initGame() {
  phase = 'play'; score = 0; fireMeter = 68; fireDecay = 0.014;
  items = []; smokeP = []; floatT = [];
  shakeX = 0; shakeY = 0; shakePow = 0;
  frame = 0; spawnEvery = 92; nextSpawn = 75;
}

// ── Tap handling ──────────────────────────────────────────────────────────────
function onTap(tx, ty) {
  if (phase === 'title') { initGame(); return; }
  if (phase === 'over') {
    if (Math.abs(tx - W / 2) < 115 && Math.abs(ty - (H / 2 + 125)) < 42) initGame();
    return;
  }
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    if (it.hit) continue;
    const dx = tx - it.x, dy = ty - it.y;
    if (dx * dx + dy * dy < it.r * it.r * 1.3) {
      it.tap();
      if (it.type === 'log') {
        fireMeter = Math.min(100, fireMeter + 18);
        floatT.push(new FloatText(it.x, it.y - 22, '+🔥', '#FF8C00'));
        for (let k = 0; k < 10; k++) fireP.push(new FirePart(W / 2, H - 118, fireMeter));
        sndWood();
      } else if (it.type === 'mallow') {
        score += 10;
        floatT.push(new FloatText(it.x, it.y - 22, '+10 🍡', '#FFD700'));
        sndDing();
      } else {
        score += 2;
        floatT.push(new FloatText(it.x, it.y - 22, '✋', '#88ddff'));
      }
      break;
    }
  }
}

// ── Update ────────────────────────────────────────────────────────────────────
function update() {
  fireMeter -= fireDecay;
  if (fireMeter <= 0) {
    fireMeter = 0; phase = 'over';
    if (score > highScore) { highScore = score; localStorage.setItem('cfc_hs', highScore); }
    return;
  }
  // Difficulty ramp every 5 seconds
  if (frame % 300 === 0 && frame > 0) {
    fireDecay   = Math.min(0.038, fireDecay + 0.0014);
    spawnEvery  = Math.max(44, spawnEvery - 3);
  }
  // Spawn items
  if (frame >= nextSpawn) {
    items.push(new Item());
    nextSpawn = frame + spawnEvery + Math.floor(Math.random() * 28);
  }
  // Update items
  items = items.filter(it => {
    const alive = it.update();
    if (!alive) return false;
    if (!it.hit && it.gone()) {
      if (it.type === 'water') {
        fireMeter  = Math.max(0, fireMeter - 30);
        shakePow   = 20;
        sndHiss();
        for (let k = 0; k < 22; k++) smokeP.push(new SmokePart(W / 2, H - 138));
        floatT.push(new FloatText(W / 2, H - 175, 'Pssssst!', '#aaeeff'));
      }
      return false;
    }
    return true;
  });
}

// ── Always-update (runs every frame, even on title/over) ─────────────────────
function tick() {
  frame++;
  // Fire particles — always active for ambience
  if (fireMeter > 4 && fireP.length < 130) {
    const n = fireMeter > 60 ? 2 : 1;
    for (let k = 0; k < n; k++) fireP.push(new FirePart(W / 2, H - 118, fireMeter));
  }
  fireP  = fireP.filter(p => { const ok = p.update(); return ok; });
  smokeP = smokeP.filter(p => p.update());
  floatT = floatT.filter(t => t.update());
  // Shake decay
  if (shakePow > 0.3) {
    shakeX = (Math.random() - 0.5) * shakePow;
    shakeY = (Math.random() - 0.5) * shakePow;
    shakePow *= 0.80;
  } else { shakeX = 0; shakeY = 0; }
}

// ── Draw helpers ──────────────────────────────────────────────────────────────
function drawBg() {
  // Night sky
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.78);
  sky.addColorStop(0, '#06061c'); sky.addColorStop(0.55, '#0c0c28'); sky.addColorStop(1, '#18102a');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  // Crescent moon
  const mx = W * 0.79, my = H * 0.09;
  ctx.fillStyle = '#fdf8d4';
  ctx.shadowColor = '#ffe870'; ctx.shadowBlur = 20;
  ctx.beginPath(); ctx.arc(mx, my, 26, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#06061c';
  ctx.beginPath(); ctx.arc(mx + 14, my - 5, 22, 0, Math.PI * 2); ctx.fill();

  // Stars
  stars.forEach(s => {
    s.ph += s.sp;
    ctx.globalAlpha = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(s.ph));
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawGlow(intensity) {
  const cx = W / 2, cy = H - 78;
  const r = 110 + intensity * 1.5;
  const g = ctx.createRadialGradient(cx, cy - 25, 0, cx, cy - 25, r);
  g.addColorStop(0,   `rgba(255,145,35,${0.42 * intensity / 100})`);
  g.addColorStop(0.4, `rgba(255,80,10,${0.20 * intensity / 100})`);
  g.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
}

function drawTrees() {
  ctx.fillStyle = '#04100a';
  trees.forEach(({ x, y, s }) => {
    for (let t = 0; t < 4; t++) {
      const tw = (70 - t * 13) * s, th = 48 * s, ty = y - t * 30 * s;
      ctx.beginPath(); ctx.moveTo(x, ty - th); ctx.lineTo(x - tw/2, ty); ctx.lineTo(x + tw/2, ty); ctx.closePath(); ctx.fill();
    }
    ctx.fillRect(x - 4 * s, y, 8 * s, 20 * s);
  });
}

function drawGround() {
  const gy = H - 52;
  const g = ctx.createLinearGradient(0, gy, 0, H);
  g.addColorStop(0, '#0a2a0a'); g.addColorStop(0.35, '#061505'); g.addColorStop(1, '#030a03');
  ctx.fillStyle = g; ctx.fillRect(0, gy, W, H - gy);
  // Ground glow near fire
  const gg = ctx.createRadialGradient(W/2, gy, 0, W/2, gy, 95);
  gg.addColorStop(0, `rgba(255,130,20,${0.28 * fireMeter / 100})`);
  gg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = gg; ctx.fillRect(0, gy, W, H - gy);
  // Grass tufts
  ctx.fillStyle = '#0e3a0e';
  for (let gx = 8; gx < W; gx += 20) {
    const gh = 3 + Math.sin(gx * 0.35) * 2.5;
    ctx.beginPath(); ctx.moveTo(gx, gy); ctx.quadraticCurveTo(gx + 4, gy - gh, gx + 8, gy); ctx.fill();
  }
}

function drawCampfire() {
  const cx = W / 2, cy = H - 65;
  // Stone ring
  for (let i = 0; i < 10; i++) {
    const a  = (i / 10) * Math.PI * 2;
    const sx = cx + Math.cos(a) * 33, sy = cy + Math.sin(a) * 13;
    const lt = 18 + ((i * 13) % 14);
    ctx.fillStyle = `hsl(0,0%,${lt}%)`; ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.ellipse(sx, sy, 7, 5, a, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  }
  // Crossed logs
  ctx.save(); ctx.translate(cx, cy);
  for (const angle of [Math.PI / 5.5, -Math.PI / 5.5]) {
    ctx.save(); ctx.rotate(angle);
    const lg = ctx.createLinearGradient(0, -5, 0, 5);
    lg.addColorStop(0, '#7a5030'); lg.addColorStop(1, '#3a1e08');
    ctx.fillStyle = lg; ctx.strokeStyle = '#1e0e04'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(-32, -5, 64, 10, 4); ctx.fill(); ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
  // Ember base glow (localised, drawn on top of logs/stones)
  const eb = ctx.createRadialGradient(cx, cy, 0, cx, cy, 32 + fireMeter * 0.14);
  eb.addColorStop(0,   `rgba(255,210,60,${0.75 * fireMeter / 100})`);
  eb.addColorStop(0.5, `rgba(255,110,0,${0.45 * fireMeter / 100})`);
  eb.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = eb;
  ctx.beginPath(); ctx.ellipse(cx, cy, 36, 14, 0, 0, Math.PI * 2); ctx.fill();
}

function drawMeter() {
  const x = 16, y = 65, w = 20, h = H * 0.28;
  // Track
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.strokeStyle = 'rgba(255,255,255,0.13)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(x, y, w, h, 5); ctx.fill(); ctx.stroke();
  // Fill
  const fh = (fireMeter / 100) * (h - 4);
  if (fh > 0) {
    const hue = fireMeter > 50 ? 30 : fireMeter > 22 ? 18 : 0;
    ctx.fillStyle = `hsl(${hue},100%,52%)`;
    ctx.beginPath(); ctx.roundRect(x + 2, y + h - 2 - fh, w - 4, fh, 3); ctx.fill();
  }
  // Fire icon
  ctx.font = '17px serif'; ctx.textAlign = 'center'; ctx.globalAlpha = 0.9;
  ctx.fillStyle = '#fff'; ctx.fillText('🔥', x + w / 2, y - 9);
  ctx.globalAlpha = 1;
  // Low fire pulse
  if (fireMeter < 22) {
    ctx.fillStyle = `rgba(220,0,0,${0.08 * (0.5 + 0.5 * Math.sin(frame * 0.14))})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawScore() {
  ctx.textAlign = 'right'; ctx.textBaseline = 'alphabetic';
  ctx.font = 'bold 30px system-ui, sans-serif';
  ctx.fillStyle = 'rgba(0,0,0,0.38)'; ctx.fillText(score, W - 16, 46);
  ctx.fillStyle = '#fff8e0'; ctx.fillText(score, W - 17, 45);
  ctx.font = '14px system-ui, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.42)'; ctx.fillText('Best: ' + highScore, W - 17, 65);
}

function drawTitle() {
  ctx.fillStyle = 'rgba(0,0,0,0.52)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  // Title glow
  ctx.shadowColor = '#FF6600'; ctx.shadowBlur = 28;
  ctx.fillStyle = '#FF8C00'; ctx.font = 'bold 42px system-ui, sans-serif';
  ctx.fillText('🔥 Cozy Campfire', W / 2, H / 2 - 100);
  ctx.shadowBlur = 0;
  // Instructions
  ctx.fillStyle = '#ffe8c0'; ctx.font = '17px system-ui, sans-serif';
  const lines = ['Tap logs → fuel the fire', 'Block water → save the flames', 'Roast marshmallows → bonus points!'];
  lines.forEach((l, i) => ctx.fillText(l, W / 2, H / 2 - 38 + i * 34));
  // Start button
  const p = 0.92 + 0.08 * Math.sin(frame * 0.07);
  ctx.save(); ctx.translate(W / 2, H / 2 + 85); ctx.scale(p, p);
  ctx.fillStyle = `rgba(255,130,0,${0.18 + 0.07 * Math.sin(frame * 0.07)})`;
  ctx.beginPath(); ctx.roundRect(-112, -32, 224, 64, 32); ctx.fill();
  ctx.fillStyle = '#FFD700'; ctx.strokeStyle = '#FF8C00'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(-112, -32, 224, 64, 32); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 22px system-ui, sans-serif'; ctx.fillText('TAP TO START', 0, 9);
  ctx.restore();
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '14px system-ui, sans-serif';
  ctx.fillText('Best: ' + highScore, W / 2, H / 2 + 148);
}

function drawOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.72)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#9aafaa'; ctx.font = 'bold 36px system-ui, sans-serif';
  ctx.fillText('The fire went out…', W / 2, H / 2 - 105);
  ctx.font = '62px serif'; ctx.fillText('💨', W / 2, H / 2 - 28);
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 34px system-ui, sans-serif';
  ctx.fillText('Score: ' + score, W / 2, H / 2 + 38);
  // High score
  if (score > 0 && score >= highScore) {
    const p = 0.84 + 0.16 * Math.sin(frame * 0.12);
    ctx.save(); ctx.translate(W / 2, H / 2 + 78); ctx.scale(p, p);
    ctx.fillStyle = '#FF8C00'; ctx.font = 'bold 21px system-ui, sans-serif'; ctx.fillText('🏆 New High Score!', 0, 0);
    ctx.restore();
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '17px system-ui, sans-serif';
    ctx.fillText('Best: ' + highScore, W / 2, H / 2 + 78);
  }
  // Restart button
  const p = 0.97 + 0.03 * Math.sin(frame * 0.08);
  ctx.save(); ctx.translate(W / 2, H / 2 + 125); ctx.scale(p, p);
  ctx.fillStyle = '#cc4400'; ctx.shadowColor = '#ff3300'; ctx.shadowBlur = 18;
  ctx.beginPath(); ctx.roundRect(-112, -36, 224, 72, 36); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff'; ctx.font = 'bold 22px system-ui, sans-serif'; ctx.fillText('🔥 Try Again', 0, 9);
  ctx.restore();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.save(); ctx.translate(shakeX, shakeY);

  drawBg();
  drawGlow(fireMeter);
  drawTrees();
  drawGround();
  // Fire particles go behind the campfire stones, above the logs
  fireP.forEach(p => p.draw()); ctx.globalAlpha = 1;
  drawCampfire();
  smokeP.forEach(p => p.draw()); ctx.globalAlpha = 1;

  if (phase === 'play') {
    items.forEach(it => it.draw()); ctx.globalAlpha = 1;
    floatT.forEach(t => t.draw());  ctx.globalAlpha = 1;
    drawMeter();
    drawScore();
  }

  ctx.restore(); // end shake

  // Title/over overlays not shaken
  if (phase === 'title') drawTitle();
  if (phase === 'over')  drawOver();
}

// ── Loop ──────────────────────────────────────────────────────────────────────
function loop() {
  tick();
  if (phase === 'play') update();
  render();
  requestAnimationFrame(loop);
}

// ── Input ─────────────────────────────────────────────────────────────────────
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const sx = W / rect.width, sy = H / rect.height;
  for (const t of e.changedTouches) {
    onTap((t.clientX - rect.left) * sx, (t.clientY - rect.top) * sy);
  }
}, { passive: false });

canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  onTap((e.clientX - rect.left) * (W / rect.width), (e.clientY - rect.top) * (H / rect.height));
});

// ── Boot ──────────────────────────────────────────────────────────────────────
resize();
loop();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registreren — Vinted</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/vinted/style.css">
</head>
<body>
<div class="page-wrap-narrow">
  <div style="text-align:center;margin-bottom:1.5rem"><a href="/vinted/" style="font-size:2rem;font-weight:800;color:var(--teal);text-decoration:none;">vinted</a></div>
  <div class="auth-card">
    <h1 class="auth-title">Account aanmaken</h1>
    <p class="auth-subtitle">Gratis registreren en meteen verkopen</p>
    <form id="register-form">
      <div class="form-group">
        <label>Gebruikersnaam</label>
        <input type="text" id="f-username" placeholder="bijv. jankleding" minlength="3" maxlength="30" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>E-mailadres</label>
        <input type="email" id="f-email" placeholder="jouw@email.nl" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Wachtwoord</label>
        <input type="password" id="f-password" placeholder="Minimaal 8 tekens" minlength="8" required autocomplete="new-password">
        <div class="form-hint">Minimaal 8 tekens</div>
      </div>
      <div id="form-error" class="form-error" style="margin-bottom:.75rem"></div>
      <button type="submit" class="btn btn-primary btn-full" id="btn-register">Account aanmaken</button>
    </form>
    <p class="auth-switch">Al een account? <a href="/vinted/login">Inloggen</a></p>
  </div>
</div>
<script src="/vinted/app.js"></script>
<script src="/vinted/static-api.js"></script>
<script src="/vinted/auth.js"></script>
</body>
</html>

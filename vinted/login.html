<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inloggen — Vinted</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/vinted/style.css">
</head>
<body>
<div class="page-wrap-narrow">
  <div style="text-align:center;margin-bottom:1.5rem"><a class="nav-logo" href="/vinted/" style="font-size:2rem;font-weight:800;color:var(--teal);">vinted</a></div>
  <div class="auth-card">
    <h1 class="auth-title">Welkom terug</h1>
    <p class="auth-subtitle">Log in op je Vinted-account</p>
    <form id="login-form">
      <div class="form-group">
        <label>E-mailadres</label>
        <input type="email" id="f-email" placeholder="jouw@email.nl" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Wachtwoord</label>
        <input type="password" id="f-password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div id="form-error" class="form-error" style="margin-bottom:.75rem"></div>
      <button type="submit" class="btn btn-primary btn-full" id="btn-login">Inloggen</button>
    </form>
    <p class="auth-switch">Nog geen account? <a href="/vinted/register">Registreer je gratis</a></p>
  </div>
</div>
<script src="/vinted/app.js"></script>
<script src="/vinted/static-api.js"></script>
<script src="/vinted/auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#04020c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Ontdek elke dag iets nieuws en bijzonders met James' Wonder-App!" />
  <title>James' Wonder-App ✦</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Lexend:wght@400;600;700;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Starfield canvas (behind everything) -->
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <!-- ══════════════════════════════════════
       SCREEN 1: HERO
  ═══════════════════════════════════════ -->
  <div id="screen-hero" class="screen active">
    <div class="hero-inner">

      <div class="hero-badge" aria-hidden="true">✦ DAGELIJKS WONDERAVONTUUR ✦</div>

      <h1 class="hero-title">
        <span>Hé James!</span>
        <span class="hero-wave" aria-hidden="true">👋</span>
      </h1>

      <p class="hero-sub">Druk op de knop<br>en ontdek iets bijzonders</p>

      <!-- The cosmic discover button -->
      <div class="btn-cosmos-wrap">
        <button id="btn-wonder" class="btn-cosmos" aria-label="Ontdek een wonder">
          <span class="cosmos-ring cosmos-ring-1" aria-hidden="true"></span>
          <span class="cosmos-ring cosmos-ring-2" aria-hidden="true"></span>
          <span class="cosmos-ring cosmos-ring-3" aria-hidden="true"></span>
          <span class="cosmos-glow"               aria-hidden="true"></span>
          <span class="cosmos-core"               aria-hidden="true">
            <span class="cosmos-icon">✦</span>
            <span class="cosmos-label">ONTDEK</span>
            <span class="cosmos-hint">tik hier</span>
          </span>
        </button>
      </div>

      <!-- Category filter pills -->
      <p class="worlds-label">Of kies een thema</p>
      <div class="worlds-scroll" role="list" aria-label="Thema's">
        <button class="world-pill" data-category="space"      role="listitem">🚀 Ruimte</button>
        <button class="world-pill" data-category="animals"    role="listitem">🦁 Dieren</button>
        <button class="world-pill" data-category="history"    role="listitem">📜 Geschiedenis</button>
        <button class="world-pill" data-category="science"    role="listitem">🔬 Wetenschap</button>
        <button class="world-pill" data-category="technology" role="listitem">💡 Technologie</button>
        <button class="world-pill" data-category="nature"     role="listitem">🌿 Natuur</button>
      </div>

    </div>

    <div class="hero-scroll-hint" aria-hidden="true">
      <span class="scroll-dot"></span>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       SCREEN 2: TRANSITION BURST
  ═══════════════════════════════════════ -->
  <div id="screen-transition" class="screen">
    <canvas id="canvas-burst" aria-hidden="true"></canvas>
    <div id="portal-flash"    aria-hidden="true"></div>
  </div>

  <!-- ══════════════════════════════════════
       SCREEN 3: WONDER REVEAL
  ═══════════════════════════════════════ -->
  <div id="screen-wonder" class="screen">

    <button id="btn-back" class="btn-back" aria-label="Terug naar home">
      <span aria-hidden="true">←</span> Home
    </button>

    <div class="wonder-scroll" id="wonder-scroll">

      <!-- Phase 1: Title & Intro -->
      <div id="phase-1" class="wonder-phase hidden">
        <div class="wonder-top">
          <span id="wonder-emoji" class="wonder-emoji" aria-hidden="true"></span>
          <span class="wonder-category-tag" id="wonder-category-tag"></span>
        </div>
        <h1 id="content-title" class="wonder-title"></h1>
        <p  id="content-intro" class="wonder-intro"></p>
      </div>

      <!-- Phase 2: Philosophy question -->
      <div id="phase-2" class="wonder-phase hidden">
        <div class="philosophy-card">
          <div class="phil-header">
            <span class="phil-icon" aria-hidden="true">💭</span>
            <span class="phil-label">Vraag om over na te denken</span>
          </div>
          <blockquote id="content-philosophy" class="phil-question"></blockquote>
        </div>

        <button id="btn-lees-verder" class="btn-continue">
          Lees verder <span aria-hidden="true">↓</span>
        </button>
      </div>

      <!-- Phase 3: Deep dive -->
      <div id="phase-3" class="wonder-phase hidden">
        <div class="deepdive-card">
          <div class="deepdive-header">
            <span aria-hidden="true">🔍</span>
            <span>Wist je dat...</span>
          </div>
          <p id="content-deepdive" class="deepdive-text"></p>
        </div>

        <button id="btn-opnieuw" class="btn-new-wonder">
          <span aria-hidden="true">✦</span>
          Nog een wonder!
        </button>
      </div>

    </div>
  </div>

  <!-- Flash / transition overlay -->
  <div id="flash-overlay" aria-hidden="true"></div>

  <!-- GSAP from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="app.js" defer></script>
</body>
</html>

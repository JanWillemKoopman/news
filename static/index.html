<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekoverzicht</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <header>
    <div class="container">
      <div class="header-top">
        <span class="header-date" id="header-date"></span>
        <span class="header-label">Wekelijks nieuwsoverzicht</span>
      </div>
      <div class="header-title-wrap">
        <h1 class="site-title">Weekoverzicht</h1>
      </div>
      <p class="site-sub">Een wekelijkse samenvatting van het nieuws in Nederland en de wereld</p>
    </div>
  </header>

  <main class="container">

    <div id="summaries-list"></div>

    <div id="empty-state" class="empty-state" style="display:none;">
      <p>Er zijn nog geen samenvattingen beschikbaar. De eerste verschijnt aanstaande zondag om 16:00 uur.</p>
    </div>

    <div id="loading-state" class="loading-state">
      <span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>
    </div>

    <div id="pagination" style="display:none;">
      <button id="load-more-btn" class="btn-older">
        Ouder nieuws <span class="btn-arrow">&#8594;</span>
      </button>
    </div>

  </main>

  <footer>
    <div class="container">
      <div class="footer-inner">
        <span>Weekoverzicht</span>
        <span class="footer-sep">&mdash;</span>
        <span>Gegenereerd met Gemini AI</span>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
